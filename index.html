<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stegano Web App - Vibecoding</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #10b981;
            --primary-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Tlačidlo Späť na portál podľa zadania */
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        header {
            text-align: center;
            margin-top: 80px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: -webkit-linear-gradient(#10b981, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 5px;
        }

        .app-container {
            width: 90%;
            max-width: 600px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            display: block;
            width: 100%;
            padding: 15px;
            text-align: center;
            border: 2px dashed var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .file-upload-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(16, 185, 129, 0.05);
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .action-btn:hover {
            background: var(--primary-hover);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .result-area {
            margin-top: 20px;
            text-align: center;
        }

        canvas {
            display: none; /* Skryté plátno pre spracovanie obrazu */
        }
        
        #downloadLink {
            display: none;
            margin-top: 15px;
            text-align: center;
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        #downloadLink:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- POVINNÉ TLAČIDLO PRE NÁVRAT -->
    <a href="#" class="back-button" onclick="alert('Návrat na centrálny portál (tu bude reálna URL po integrácii)')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Späť na portál
    </a>

    <header>
        <h1>SteganoMagia</h1>
        <p class="subtitle">Skrytie textu do obrázka (Client-Side LSB technológia)</p>
    </header>

    <div class="app-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('encode')">Šifrovať (Schovať)</button>
            <button class="tab-btn" onclick="switchTab('decode')">Dešifrovať (Odhaľovať)</button>
        </div>

        <!-- ŠIFROVANIE -->
        <div id="encode-tab" class="tab-content active">
            <div class="input-group">
                <label>1. Vyberte obrázok (PNG/JPG)</label>
                <label for="encodeImage" class="file-upload-btn" id="encodeFileLabel">Kliknite pre výber súboru</label>
                <input type="file" id="encodeImage" accept="image/png, image/jpeg" onchange="updateLabel('encodeImage', 'encodeFileLabel')">
            </div>
            
            <div class="input-group">
                <label>2. Tajná správa</label>
                <textarea id="secretText" placeholder="Napíšte sem svoj tajný text..."></textarea>
            </div>

            <button class="action-btn" onclick="encodeMessage()">Generovať WOW Efekt (Skryť)</button>
            
            <div class="result-area">
                <a id="downloadLink" download="secret_image.png">⬇️ Stiahnuť zašifrovaný obrázok (PNG)</a>
            </div>
        </div>

        <!-- DEŠIFROVANIE -->
        <div id="decode-tab" class="tab-content">
            <div class="input-group">
                <label>1. Nahrajte zašifrovaný obrázok (iba PNG)</label>
                <label for="decodeImage" class="file-upload-btn" id="decodeFileLabel">Kliknite pre výber súboru</label>
                <input type="file" id="decodeImage" accept="image/png" onchange="updateLabel('decodeImage', 'decodeFileLabel')">
            </div>

            <button class="action-btn" onclick="decodeMessage()">Odhaľ tajomstvo!</button>

            <div class="input-group" style="margin-top: 20px;">
                <label>Odhalená správa:</label>
                <textarea id="revealedText" readonly placeholder="Tu sa zobrazí skrytá správa..."></textarea>
            </div>
        </div>
    </div>

    <!-- Skryté plátno pre Pixel manipuláciu -->
    <canvas id="canvas"></canvas>

    <script>
        // --- UI Logika ---
        function switchTab(tab) {
            document.getElementById('encode-tab').classList.remove('active');
            document.getElementById('decode-tab').classList.remove('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            if (tab === 'encode') {
                document.getElementById('encode-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('decode-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        function updateLabel(inputId, labelId) {
            const input = document.getElementById(inputId);
            const label = document.getElementById(labelId);
            if (input.files && input.files[0]) {
                label.innerText = `Vybrané: ${input.files[0].name}`;
                label.style.borderColor = 'var(--primary)';
                label.style.color = 'var(--primary)';
            }
        }

        // --- Steganografia LSB Logika (Čistý Frontend) ---
        const DELIMITER = '|||';

        function encodeMessage() {
            const fileInput = document.getElementById('encodeImage');
            const secretText = document.getElementById('secretText').value;

            if (!fileInput.files[0]) return alert('Prosím, vyberte obrázok!');
            if (!secretText) return alert('Prosím, zadajte tajnú správu!');

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;

                    // Konverzia textu na bajty (podporuje mäkčene, dĺžne vďaka TextEncoder)
                    const encoder = new TextEncoder();
                    const textBytes = encoder.encode(secretText + DELIMITER);
                    
                    let binaryStr = '';
                    for (let byte of textBytes) {
                        binaryStr += byte.toString(2).padStart(8, '0');
                    }

                    if (binaryStr.length > data.length / 4 * 3) {
                        return alert('Správa je príliš dlhá pre tento obrázok!');
                    }

                    // Vkladanie bitov do LSB (Najmenej významného bitu) RGB kanálov
                    let bitIndex = 0;
                    for (let i = 0; i < data.length; i += 4) {
                        for (let j = 0; j < 3; j++) { // Iba R, G, B. Alpha (A) nemeníme.
                            if (bitIndex < binaryStr.length) {
                                // Vymaž posledný bit a vlož náš bit zo správy
                                data[i + j] = (data[i + j] & 0xFE) | parseInt(binaryStr[bitIndex]);
                                bitIndex++;
                            }
                        }
                        if (bitIndex >= binaryStr.length) break;
                    }

                    ctx.putImageData(imgData, 0, 0);

                    // Vytvorenie odkazu na stiahnutie. MUSÍ byť PNG, inak sa dáta pri kompresii (JPG) zničia!
                    const downloadLink = document.getElementById('downloadLink');
                    downloadLink.href = canvas.toDataURL('image/png');
                    downloadLink.style.display = 'block';
                    
                    // WOW Efekt
                    document.getElementById('encodeFileLabel').innerText = "Úspech! Dáta sú v pixeloch.";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function decodeMessage() {
            const fileInput = document.getElementById('decodeImage');
            if (!fileInput.files[0]) return alert('Prosím, vyberte zašifrovaný obrázok!');

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;

                    let extractedBits = '';
                    // Prečítame všetky LSB a hľadáme delimiter
                    for (let i = 0; i < data.length; i += 4) {
                        for (let j = 0; j < 3; j++) {
                            extractedBits += (data[i + j] & 1).toString();
                        }
                    }

                    // Konverzia bitov späť na bajty a text
                    const bytes = [];
                    for (let i = 0; i < extractedBits.length; i += 8) {
                        const byteStr = extractedBits.substring(i, i + 8);
                        if (byteStr.length === 8) {
                            bytes.push(parseInt(byteStr, 2));
                        }
                    }

                    const decoder = new TextDecoder();
                    const fullText = decoder.decode(new Uint8Array(bytes));
                    
                    const delimiterIndex = fullText.indexOf(DELIMITER);
                    if (delimiterIndex !== -1) {
                        const secretMessage = fullText.substring(0, delimiterIndex);
                        document.getElementById('revealedText').value = secretMessage;
                    } else {
                        document.getElementById('revealedText').value = "Žiadna skrytá správa nebola nájdená alebo bol obrázok komprimovaný.";
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(fileInput.files[0]);
        }
    </script>
</body>
</html>
