<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stegano Web App - Vibecoding Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #10b981;
            --primary-hover: #059669;
            --secondary: #38bdf8;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        header {
            text-align: center;
            margin-top: 80px;
            margin-bottom: 30px;
        }

        /* Glitch effect for title */
        h1 {
            font-size: 2.8rem;
            margin: 0;
            background: -webkit-linear-gradient(#10b981, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
        }
        
        h1::before, h1::after {
            content: 'SteganoMagia';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.5;
            z-index: -1;
        }
        h1::before {
            left: 2px;
            text-shadow: -1px 0 red;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }
        h1::after {
            left: -2px;
            text-shadow: -1px 0 blue;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip: rect(20px, 9999px, 85px, 0); }
            20% { clip: rect(75px, 9999px, 15px, 0); }
            40% { clip: rect(10px, 9999px, 55px, 0); }
            60% { clip: rect(90px, 9999px, 35px, 0); }
            80% { clip: rect(40px, 9999px, 95px, 0); }
            100% { clip: rect(60px, 9999px, 5px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(15px, 9999px, 90px, 0); }
            20% { clip: rect(50px, 9999px, 20px, 0); }
            40% { clip: rect(80px, 9999px, 60px, 0); }
            60% { clip: rect(25px, 9999px, 40px, 0); }
            80% { clip: rect(95px, 9999px, 10px, 0); }
            100% { clip: rect(5px, 9999px, 70px, 0); }
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 5px;
            font-size: 1.1rem;
        }

        .app-container {
            width: 90%;
            max-width: 650px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }
        
        .capacity-badge {
            font-size: 0.8rem;
            background: rgba(56, 189, 248, 0.2);
            color: var(--secondary);
            padding: 2px 8px;
            border-radius: 12px;
            display: none;
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            display: block;
            width: 100%;
            padding: 25px 15px;
            text-align: center;
            border: 2px dashed var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s;
            box-sizing: border-box;
            background: rgba(0,0,0,0.1);
        }

        .file-upload-btn:hover, .file-upload-btn.dragover {
            border-color: var(--secondary);
            color: var(--secondary);
            background: rgba(56, 189, 248, 0.05);
            transform: scale(1.02);
        }

        .image-preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            margin-top: 10px;
            border-radius: 8px;
            display: none;
            border: 1px solid var(--glass-border);
            background: #000;
        }

        textarea, input[type="password"] {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .action-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn.processing {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result-area {
            margin-top: 20px;
            text-align: center;
        }

        canvas {
            display: none;
        }
        
        #downloadLink {
            display: none;
            margin-top: 15px;
            text-align: center;
            color: var(--secondary);
            text-decoration: none;
            font-weight: bold;
            padding: 12px;
            border: 1px solid var(--secondary);
            border-radius: 8px;
            background: rgba(56, 189, 248, 0.1);
            transition: all 0.3s;
        }

        #downloadLink:hover {
            background: rgba(56, 189, 248, 0.2);
            transform: translateY(-2px);
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out forwards;
            backdrop-filter: blur(5px);
        }

        .toast.success { background: rgba(16, 185, 129, 0.9); border: 1px solid #059669; }
        .toast.error { background: rgba(239, 68, 68, 0.9); border: 1px solid #dc2626; }
        .toast.info { background: rgba(56, 189, 248, 0.9); border: 1px solid #0284c7; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>
<body>

    <a href="#" class="back-button" onclick="showToast('Návrat na centrálny portál...', 'info')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Späť na portál
    </a>

    <header>
        <h1>SteganoMagia</h1>
        <p class="subtitle">Skrytie textu do obrázka (Client-Side LSB technológia)</p>
    </header>

    <div class="app-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('encode')">Šifrovať (Schovať)</button>
            <button class="tab-btn" onclick="switchTab('decode')">Dešifrovať (Odhaľovať)</button>
        </div>

        <!-- ŠIFROVANIE -->
        <div id="encode-tab" class="tab-content active">
            <div class="input-group">
                <label>
                    1. Vyberte obrázok (PNG/JPG) 
                    <span id="capacityBadge" class="capacity-badge">Kapacita: 0 znakov</span>
                </label>
                <label for="encodeImage" class="file-upload-btn drop-zone" id="encodeFileLabel">
                    Kliknite pre výber alebo potiahnite súbor sem (Drag & Drop)
                </label>
                <input type="file" id="encodeImage" accept="image/png, image/jpeg">
                <img id="encodePreview" class="image-preview" alt="Náhľad obrázka">
            </div>
            
            <div class="input-group">
                <label>2. Voliteľné: Ochranný PIN / Heslo</label>
                <input type="password" id="encodePassword" placeholder="Zadajte heslo pre extra šifrovanie...">
            </div>

            <div class="input-group">
                <label>3. Tajná správa</label>
                <textarea id="secretText" placeholder="Napíšte sem svoj tajný text..."></textarea>
            </div>

            <button class="action-btn" id="btnEncode" onclick="encodeMessage()">Generovať WOW Efekt (Skryť)</button>
            
            <div class="result-area">
                <a id="downloadLink" download="secret_image.png">⬇️ Stiahnuť zašifrovaný obrázok (PNG)</a>
            </div>
        </div>

        <!-- DEŠIFROVANIE -->
        <div id="decode-tab" class="tab-content">
            <div class="input-group">
                <label>1. Nahrajte zašifrovaný obrázok (iba PNG)</label>
                <label for="decodeImage" class="file-upload-btn drop-zone" id="decodeFileLabel">
                    Kliknite pre výber alebo potiahnite súbor sem
                </label>
                <input type="file" id="decodeImage" accept="image/png">
                <img id="decodePreview" class="image-preview" alt="Náhľad obrázka">
            </div>

            <div class="input-group">
                <label>2. Ochranný PIN / Heslo (Ak bolo použité)</label>
                <input type="password" id="decodePassword" placeholder="Zadajte heslo...">
            </div>

            <button class="action-btn" id="btnDecode" onclick="decodeMessage()">Odhaľ tajomstvo!</button>

            <div class="input-group" style="margin-top: 20px;">
                <label>Odhalená správa:</label>
                <textarea id="revealedText" readonly placeholder="Tu sa zobrazí skrytá správa..."></textarea>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toast-container"></div>

    <!-- Skryté plátno pre Pixel manipuláciu -->
    <canvas id="canvas"></canvas>

    <script>
        // --- UI Logika ---
        function switchTab(tab) {
            document.getElementById('encode-tab').classList.remove('active');
            document.getElementById('decode-tab').classList.remove('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            if (tab === 'encode') {
                document.getElementById('encode-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('decode-tab').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease-out forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Drag & Drop a File Preview Logika ---
        function setupFileInput(inputId, labelId, previewId, isEncode) {
            const input = document.getElementById(inputId);
            const label = document.getElementById(labelId);
            const preview = document.getElementById(previewId);

            // Drag and drop events
            label.addEventListener('dragover', (e) => {
                e.preventDefault();
                label.classList.add('dragover');
            });
            label.addEventListener('dragleave', () => {
                label.classList.remove('dragover');
            });
            label.addEventListener('drop', (e) => {
                e.preventDefault();
                label.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    handleFileChange();
                }
            });

            // Click upload event
            input.addEventListener('change', handleFileChange);

            function handleFileChange() {
                if (input.files && input.files[0]) {
                    const file = input.files[0];
                    label.innerText = `Vybrané: ${file.name}`;
                    
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        preview.style.display = 'block';

                        // Vypočítanie kapacity pre Encode tab
                        if(isEncode) {
                            const img = new Image();
                            img.onload = function() {
                                // Kapacita: (Šírka * Výška * 3 (RGB)) / 8 bitov = počet Bajtov
                                const maxBytes = Math.floor((img.width * img.height * 3) / 8);
                                const capacityBadge = document.getElementById('capacityBadge');
                                capacityBadge.innerText = `Max kapacita: ~${maxBytes} znakov`;
                                capacityBadge.style.display = 'inline-block';
                            };
                            img.src = e.target.result;
                        }
                    }
                    reader.readAsDataURL(file);
                }
            }
        }

        setupFileInput('encodeImage', 'encodeFileLabel', 'encodePreview', true);
        setupFileInput('decodeImage', 'decodeFileLabel', 'decodePreview', false);

        // --- Steganografia LSB s XOR šifrovaním ---
        // Používame byty ako delimiter, aby sme predišli problémom s UTF-8 po XOR šifrovaní
        const DELIMITER = [124, 124, 124]; // ASCII pre "|||"

        function encodeMessage() {
            const fileInput = document.getElementById('encodeImage');
            const secretText = document.getElementById('secretText').value;
            const password = document.getElementById('encodePassword').value;
            const btn = document.getElementById('btnEncode');

            if (!fileInput.files[0]) return showToast('Prosím, vyberte obrázok!', 'error');
            if (!secretText) return showToast('Prosím, zadajte tajnú správu!', 'error');

            btn.classList.add('processing');
            btn.innerText = 'Šifrujem...';

            setTimeout(() => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.getElementById('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);

                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imgData.data;

                        const encoder = new TextEncoder();
                        let textBytes = encoder.encode(secretText);

                        // XOR Šifrovanie ak je zadané heslo
                        if (password) {
                            for (let i = 0; i < textBytes.length; i++) {
                                textBytes[i] ^= password.charCodeAt(i % password.length);
                            }
                        }

                        // Spojenie tajnej správy a delimitera do jedného poľa
                        let finalBytes = new Uint8Array(textBytes.length + DELIMITER.length);
                        finalBytes.set(textBytes);
                        finalBytes.set(DELIMITER, textBytes.length);

                        let binaryStr = '';
                        for (let byte of finalBytes) {
                            binaryStr += byte.toString(2).padStart(8, '0');
                        }

                        if (binaryStr.length > (data.length / 4) * 3) {
                            btn.classList.remove('processing');
                            btn.innerText = 'Generovať WOW Efekt (Skryť)';
                            return showToast('Správa je príliš dlhá pre tento obrázok!', 'error');
                        }

                        let bitIndex = 0;
                        for (let i = 0; i < data.length; i += 4) {
                            for (let j = 0; j < 3; j++) {
                                if (bitIndex < binaryStr.length) {
                                    data[i + j] = (data[i + j] & 0xFE) | parseInt(binaryStr[bitIndex]);
                                    bitIndex++;
                                }
                            }
                            if (bitIndex >= binaryStr.length) break;
                        }

                        ctx.putImageData(imgData, 0, 0);

                        const downloadLink = document.getElementById('downloadLink');
                        downloadLink.href = canvas.toDataURL('image/png');
                        downloadLink.style.display = 'inline-block';
                        
                        showToast('Úspech! Dáta sú bezpečne v pixeloch.', 'success');
                        btn.classList.remove('processing');
                        btn.innerText = 'Generovať WOW Efekt (Skryť)';
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(fileInput.files[0]);
            }, 100); // Malý timeout pre UI update
        }

        function decodeMessage() {
            const fileInput = document.getElementById('decodeImage');
            const password = document.getElementById('decodePassword').value;
            const btn = document.getElementById('btnDecode');

            if (!fileInput.files[0]) return showToast('Prosím, vyberte zašifrovaný obrázok!', 'error');

            btn.classList.add('processing');
            btn.innerText = 'Dekódujem...';

            setTimeout(() => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.getElementById('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);

                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imgData.data;

                        let extractedBits = '';
                        for (let i = 0; i < data.length; i += 4) {
                            for (let j = 0; j < 3; j++) {
                                extractedBits += (data[i + j] & 1).toString();
                            }
                        }

                        const bytes = [];
                        for (let i = 0; i < extractedBits.length; i += 8) {
                            const byteStr = extractedBits.substring(i, i + 8);
                            if (byteStr.length === 8) {
                                bytes.push(parseInt(byteStr, 2));
                            }
                        }

                        // Hľadanie delimitera [124, 124, 124]
                        let delimIndex = -1;
                        for (let i = 0; i < bytes.length - 2; i++) {
                            if (bytes[i] === DELIMITER[0] && bytes[i+1] === DELIMITER[1] && bytes[i+2] === DELIMITER[2]) {
                                delimIndex = i;
                                break;
                            }
                        }

                        if (delimIndex !== -1) {
                            let messageBytes = bytes.slice(0, delimIndex);

                            // Dešifrovanie XOR, ak je prítomné heslo
                            if (password) {
                                for (let i = 0; i < messageBytes.length; i++) {
                                    messageBytes[i] ^= password.charCodeAt(i % password.length);
                                }
                            }

                            try {
                                const decoder = new TextDecoder('utf-8', { fatal: true });
                                const secretMessage = decoder.decode(new Uint8Array(messageBytes));
                                document.getElementById('revealedText').value = secretMessage;
                                showToast('Správa úspešne dekódovaná!', 'success');
                            } catch (e) {
                                document.getElementById('revealedText').value = '';
                                showToast('Chyba dekódovania. Nesprávne heslo?', 'error');
                            }
                        } else {
                            document.getElementById('revealedText').value = '';
                            showToast('Žiadna správa sa nenašla. Obrázok neobsahuje dáta.', 'error');
                        }

                        btn.classList.remove('processing');
                        btn.innerText = 'Odhaľ tajomstvo!';
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(fileInput.files[0]);
            }, 100);
        }
    </script>
</body>
</html>
